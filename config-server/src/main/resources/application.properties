spring.application.name=config-server
server.port= 8888

# Git Repository Configuration
spring.cloud.config.server.git.uri=https://github.com/AmrutanshuKar-Cognizant/PoD-1-AgriServe-config-repo.git
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true
spring.cloud.config.server.git.skip-ssl-validation=true

# Authentication using IntelliJ Environment Variables
#spring.cloud.config.server.git.username=${GITHUB_USER}
#spring.cloud.config.server.git.password=${GITHUB_TOKEN}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
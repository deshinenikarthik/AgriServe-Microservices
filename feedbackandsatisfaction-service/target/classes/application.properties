spring.application.name=FEEDBACKANDSATISFACTION-SERVICE
server.port=8087

# ===== DataSource Configuration =====
spring.datasource.url=jdbc:mysql://localhost:3306/feedbackandsatisfactionservice_db
spring.datasource.username=root
spring.datasource.password=22311A0511
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Eureka Client =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ===== Config Server =====
spring.config.import=optional:configserver:http://localhost:8888

# ===== Feign Client =====
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# ===== Logging =====
logging.level.com.cognizant.agriserve=DEBUG
logging.level.feign=DEBUG

# ===== Security (permit all internal endpoints by default) =====
spring.security.user.name=admin
spring.security.user.password=admin
# ===== Resilience (Required for Feign Fallback) =====
spring.cloud.openfeign.circuitbreaker.enabled=true

internal.service.key=MyClientSecretKey123!

spring.jackson.mapper.accept-case-insensitive-enums=true